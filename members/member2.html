<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member 2 — Profile</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* Reset body so the card fills the iframe cleanly */
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      display: flex;
      align-items: flex-start;
      min-height: 100vh;
    }
    .member-card {
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="member-card">

    <!-- ↓ Replace profile/member2.png with your own photo -->
    <img src="../profile/member2.png" alt="Profile picture" class="member-avatar" />

    <!-- ↓ Replace with your full name -->
    <div class="member-name">YOUR NAME</div>

    <!-- ↓ Replace with your role, title, or how you'd describe yourself -->
    <div class="member-role">YOUR ROLE</div>

    <!-- ↓ Write 2–3 sentences about yourself -->
    <div class="member-bio">
      Write a short bio about yourself here. What do you do? What are you interested in?
      Two or three sentences is perfect.
    </div>

    <!-- ↓ Replace with one fun or surprising fact about you -->
    <div class="fun-fact">
      <span>Fun fact:</span> Add a fun or surprising fact about yourself here.
    </div>

    <!-- ↓ Replace ❓ with your single favourite emoji -->
    <div class="fav-emoji">❓</div>

  </div>

</body>
</html>
