<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    =====================================================
    HOW TO USE THIS TEMPLATE
    =====================================================
    1. Copy this file and rename it to members/yourname.html
       (use your actual first name, lowercase, no spaces)
       e.g.  members/sarah.html  or  members/marcus.html

    2. Fill in ALL the fields marked with  ← CHANGE THIS

    3. Save your file, then open index.html in the browser
       to see how it looks in the team grid.

    4. When you're happy with it, push your branch and
       open a Pull Request!
    =====================================================
  -->
  <title>Example Member — Team Profile</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    /* Keep the card centred when viewed standalone */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f0e8;
    }
  </style>
</head>
<body>

  <div class="member-card">

    <!-- Your profile picture — replace profile/memberN.png with your own photo! -->
    <img src="../profile/memberN.png" alt="Profile picture" class="member-avatar" />  <!-- ← CHANGE THIS -->

    <!-- Your full name -->
    <div class="member-name">Alex Example</div>  <!-- ← CHANGE THIS -->

    <!-- Your role, title, or how you'd describe yourself -->
    <div class="member-role">Full Stack Developer</div>  <!-- ← CHANGE THIS -->

    <!-- 2–3 sentences about yourself -->
    <div class="member-bio">
      I'm a developer who loves building things for the web. When I'm not coding,
      you'll find me making terrible puns and great coffee.  <!-- ← CHANGE THIS -->
    </div>

    <!-- One fun/surprising fact about you -->
    <div class="fun-fact">
      <span>Fun fact:</span> I once debugged a production issue in my sleep.  <!-- ← CHANGE THIS -->
    </div>

    <!-- Your single favourite emoji -->
    <div class="fav-emoji">🚀</div>  <!-- ← CHANGE THIS -->

  </div>

</body>
</html>
